name: docker-publish

# Builds the root Dockerfile (server deployment image) and pushes it to Docker
# Hub. Triggered by the release skill's tag push (`git push origin vX.Y.Z`,
# see .claude/skills/release/SKILL.md Stage 6) so the image version tracks the
# npm package version. workflow_dispatch is available for manual re-runs (e.g.
# recovering from a push failure without re-cutting a release).
#
# Requires two repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (a Docker Hub
# access token — Account Settings -> Security -> New Access Token).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/agentic-kanban
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
