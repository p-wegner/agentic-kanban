name: arch-gate

# Makes the architecture gates actually BLOCK merges instead of only living in
# manual local commands. `pnpm check:arch` is the composite gate of record (#982):
#   - scripts/check-god-modules.mjs — god-module ceiling/cohesion (arch-review #875, #888)
#   - pnpm lint:arch — dependency-cruiser layering rules (was only in the manual
#     `pnpm check` and sat red on master for 5 days unnoticed; fixed in #981)
# Runs on every PR into master and on direct pushes to master. Enable branch
# protection on `master` requiring this check so a breach cannot land — which is
# exactly the failure #888 documented (a 1042-line file merged past a red gate).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  god-module-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # The god-module gate needs `typescript` for a precise behavioral-export count
      # (regex fallback if absent), and lint:arch needs the `dependency-cruiser`
      # devDep — the full frozen install covers both.
      - run: pnpm install --frozen-lockfile
      - name: arch gates (god-module + depcruise layering)
        run: pnpm check:arch
