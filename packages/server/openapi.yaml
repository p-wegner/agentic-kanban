openapi: 3.1.0
info:
  title: agentic-kanban REST API
  version: 0.1.7
  description: Auto-generated from Hono route source via scripts/generate-openapi.ts. Schemas are inferred statically (best-effort) — request bodies come from the parseJsonBody<T> type argument; response bodies are untyped.
servers:
  - url: /
    description: "Same-origin (default dev: http://localhost:3001)"
paths:
  /api/agent-skills:
    get:
      summary: GET /api/agent-skills — list skills
      tags:
        - agent-skills
      operationId: get_api_agent-skills
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
        - name: global
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
    post:
      summary: POST /api/agent-skills — create a skill
      tags:
        - agent-skills
      operationId: post_api_agent-skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                prompt:
                  type: string
                model:
                  type: string
                projectId:
                  type: string
                  nullable: true
              required:
                - name
                - description
                - prompt
      responses:
        "201":
          description: Success
          content:
            application/json:
              schema: {}
  /api/agent-skills/enhance:
