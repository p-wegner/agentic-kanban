      summary: POST /api/agent-skills/enhance — AI-enhance a skill name, description, and prompt
      tags:
        - agent-skills
      operationId: post_api_agent-skills_enhance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                prompt:
                  type: string
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema: {}
        "400":
          description: Error
          content:
            application/json:
              schema: {}
  /api/agent-skills/install-status:
    get:
      summary: pass (registered before /:id so the static path wins over the :id param route).
      tags:
        - agent-skills
      operationId: get_api_agent-skills_install-status
