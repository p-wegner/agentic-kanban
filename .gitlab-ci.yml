stages:
  - review

ai-code-review:
  stage: review
  image: node:22-alpine
  variables:
    ANTHROPIC_BASE_URL: "https://ao-ai-api-management.azure-api.net/ai-gateway"
    REVIEW_MR_IID: "1"
    # GATEWAY_API_KEY: set as masked CI variable in GitLab → Settings → CI/CD → Variables
  before_script:
    - apk add --no-cache git
    - cd workshop/review && npm install --silent
  script:
    - node run-review.mjs
  artifacts:
    name: "review-findings-mr$REVIEW_MR_IID"
    paths:
      - workshop/review/findings.json
    expire_in: 30 days
